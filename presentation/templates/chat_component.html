<!-- Cabeçalho do Chat -->
<header class="flex items-center justify-between px-5 py-4 flex-shrink-0
               bg-gradient-to-r from-primary-800 to-primary-900
               border-b border-primary-950/50">
    <div class="flex items-center gap-3">
        <div class="relative w-8 h-8 rounded-full bg-white/10 flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-primary-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
            <span class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-emerald-400 border-2 border-primary-800"></span>
        </div>
        <div>
            <h2 class="text-sm font-bold text-white leading-tight">Agente RAG</h2>
            <p class="text-xs text-primary-300 leading-tight">Multi-Agente · Busca Vetorial</p>
        </div>
    </div>
    <div class="flex items-center gap-1">
        <button onclick="toggleDesktopChat('{{ chat_id|default:'main' }}')"
                id="toggle-chat-btn-{{ chat_id|default:'main' }}"
                aria-label="Minimizar conversa"
                class="w-7 h-7 rounded-lg flex items-center justify-center text-primary-300
                       hover:text-white hover:bg-white/10 transition-colors duration-150">
            <svg class="w-4 h-4 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
        </button>
        <button onclick="clearChat('{{ chat_id|default:'main' }}')"
                aria-label="Limpar conversa"
                class="w-7 h-7 rounded-lg flex items-center justify-center text-primary-300
                       hover:text-white hover:bg-white/10 transition-colors duration-150">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
        </button>
    </div>
</header>

<!-- Sugestões rápidas -->
<div id="suggestions-{{ chat_id|default:'main' }}"
     class="flex-shrink-0 px-4 pt-3 pb-2 bg-slate-50 dark:bg-slate-950/50
            border-b border-slate-100 dark:border-slate-800/60">
    <p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">
        Sugestões
    </p>
    <div class="flex flex-wrap gap-1.5">
        <button onclick="fillQuery('{{ chat_id|default:'main' }}', this)"
                class="text-xs font-medium text-primary-700 dark:text-primary-300
                       bg-primary-50 dark:bg-primary-950/50
                       border border-primary-200 dark:border-primary-800/50
                       px-2.5 py-1 rounded-full hover:bg-primary-100 transition-colors">
            Qual a tendência do IPCA?
        </button>
        <button onclick="fillQuery('{{ chat_id|default:'main' }}', this)"
                class="text-xs font-medium text-primary-700 dark:text-primary-300
                       bg-primary-50 dark:bg-primary-950/50
                       border border-primary-200 dark:border-primary-800/50
                       px-2.5 py-1 rounded-full hover:bg-primary-100 transition-colors">
            Como evoluiu o desemprego?
        </button>
        <button onclick="fillQuery('{{ chat_id|default:'main' }}', this)"
                class="text-xs font-medium text-primary-700 dark:text-primary-300
                       bg-primary-50 dark:bg-primary-950/50
                       border border-primary-200 dark:border-primary-800/50
                       px-2.5 py-1 rounded-full hover:bg-primary-100 transition-colors">
            O que é o índice de miséria?
        </button>
    </div>
</div>

<!-- Área de Mensagens -->
<div id="chat-messages-{{ chat_id|default:'main' }}"
     class="flex-1 overflow-y-auto flex flex-col gap-3 p-4 bg-slate-50 dark:bg-slate-950/60"
     role="log"
     aria-live="polite"
     aria-label="Histórico do chat">

    <!-- Mensagem inicial da IA -->
    <div class="flex items-start gap-2" id="welcome-{{ chat_id|default:'main' }}">
        <div class="w-6 h-6 rounded-full bg-primary-600 flex items-center justify-center flex-shrink-0 mt-0.5">
            <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
        </div>
        <div class="max-w-[88%] bg-white dark:bg-slate-800
                    border border-slate-200 dark:border-slate-700
                    rounded-2xl rounded-tl-md px-3.5 py-2.5 shadow-sm">
            <p class="text-xs text-slate-700 dark:text-slate-300 leading-relaxed">
                Olá! Sou o <strong class="text-primary-600 dark:text-primary-400">Agente RAG</strong>
                conectado aos dados do IBGE. Posso analisar séries históricas e consultar notas
                metodológicas via busca semântica. O que deseja saber?
            </p>
        </div>
    </div>
</div>

<!-- Indicador HTMX de carregamento -->
<div id="indicator-{{ chat_id|default:'main' }}"
     class="htmx-indicator flex-shrink-0 px-4 py-2
            bg-slate-50 dark:bg-slate-950/60
            border-t border-slate-100 dark:border-slate-800/60">
    <div class="flex items-center gap-2">
        <div class="w-6 h-6 rounded-full bg-primary-600 flex items-center justify-center flex-shrink-0">
            <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
        </div>
        <div class="flex items-center gap-1 px-3 py-2 bg-white dark:bg-slate-800
                    border border-slate-200 dark:border-slate-700
                    rounded-2xl rounded-tl-md shadow-sm">
            <span class="text-xs text-slate-400 dark:text-slate-500 mr-1">Orquestrando agentes</span>
            <span class="w-1.5 h-1.5 rounded-full bg-primary-400 animate-bounce" style="animation-delay:0ms"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-primary-400 animate-bounce" style="animation-delay:150ms"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-primary-400 animate-bounce" style="animation-delay:300ms"></span>
        </div>
    </div>
</div>

<!-- Formulário HTMX -->
<div class="flex-shrink-0 p-4 bg-white dark:bg-slate-900
            border-t border-slate-200 dark:border-slate-800">
    <form id="chat-form-{{ chat_id|default:'main' }}"
          hx-post="{% url 'chat_send' %}"
          hx-target="#chat-messages-{{ chat_id|default:'main' }}"
          hx-swap="beforeend"
          hx-indicator="#indicator-{{ chat_id|default:'main' }}"
          hx-on::after-request="onChatAfterRequest('{{ chat_id|default:'main' }}')"
          class="flex items-end gap-2"
          aria-label="Formulário de chat">
        {% csrf_token %}
        <div class="flex-1">
            <textarea id="input-{{ chat_id|default:'main' }}"
                      name="query"
                      rows="1"
                      placeholder="Faça uma pergunta sobre os dados..."
                      required
                      oninput="autoResize(this)"
                      onkeydown="handleChatKey(event, '{{ chat_id|default:'main' }}')"
                      class="w-full resize-none overflow-hidden
                             bg-slate-50 dark:bg-slate-800
                             border border-slate-200 dark:border-slate-700
                             text-slate-800 dark:text-slate-200
                             placeholder-slate-400 dark:placeholder-slate-500
                             rounded-xl px-4 py-3 text-sm leading-relaxed
                             focus:outline-none focus:ring-2 focus:ring-primary-500/40
                             focus:border-primary-500 transition-all duration-150"
                      aria-label="Mensagem para o agente"></textarea>
        </div>
        <button type="submit"
                aria-label="Enviar mensagem"
                class="flex-shrink-0 w-10 h-10 rounded-xl bg-primary-600
                       hover:bg-primary-700 active:scale-95 text-white
                       flex items-center justify-center shadow-sm
                       transition-all duration-150">
            <svg class="w-4 h-4 rotate-90" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
            </svg>
        </button>
    </form>
    <p class="text-xs text-slate-400 dark:text-slate-600 text-center mt-2">
        <kbd class="font-mono bg-slate-100 dark:bg-slate-800 px-1 rounded">Enter</kbd> envia ·
        <kbd class="font-mono bg-slate-100 dark:bg-slate-800 px-1 rounded">Shift+Enter</kbd> nova linha
    </p>
</div>
